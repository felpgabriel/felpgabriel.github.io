<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yuyu&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css">
  <title>Te amo Guapita S2</title>
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #fffdfd 0%, var(--cream) 100%);
    }
  </style>
</head>
<body>
  <div class="password-card">
    <h1>Você tem acesso?</h1>
    <p>Digite a senha para abrir a carta.</p>
    <p>(Dica: A senha está em algum lugar na caixa com o top vermelho).</p>
    <input id="passwordInput" type="password" placeholder="Digite a senha" />
    <button id="accessButton" type="button">Entrar</button>
    <p class="error-message" id="errorMessage"></p>
  </div>

  <script>
    const correctPassword = "taeth";
    const passwordInput = document.getElementById("passwordInput");
    const accessButton = document.getElementById("accessButton");
    const errorMessage = document.getElementById("errorMessage");

    function tryAccess() {
      if (passwordInput.value.trim().toLowerCase() === correctPassword) {
        window.location.href = "src/letter.html";
      } else {
        errorMessage.textContent = "Senha incorreta. Você consegue amor!";
      }
    }

    accessButton.addEventListener("click", tryAccess);
    passwordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        tryAccess();
      }
    });
  </script>
</body>
</html>
