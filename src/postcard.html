<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yuyu&display=swap" rel="stylesheet">
  <title>Te amo Guapita S2</title>
  <style>
    :root {
      --rose: #f4c6d0;
      --rose-strong: #b85b74;
      --cream: #fff8f7;
      --text: #5a2f3d;
      --shadow: rgba(104, 54, 74, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Yuyu", sans-serif;
      background: linear-gradient(135deg, #fffdfd 0%, var(--cream) 100%);
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: min(92vw, 780px);
      height: min(80vh, 560px);
      display: grid;
      place-items: center;
      perspective: 1200px;
    }

    .envelope {
      position: relative;
      aspect-ratio: 3 / 2;
      width: 500px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
      z-index: 3;
    }

    .envelope.open {
      transform: translateY(140px);
    }

    .envelope.open + .postcard {
      transform: translateY(-140px);
    }

    .envelope-front {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #f7d5dc, #d98ca3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      backface-visibility: hidden;
      overflow: hidden;
    }

    .envelope-front {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 1rem;
    }

    .envelope-dobra {
      position: absolute;
      top: -100px;
      width: 100%;
      height: 250px;
      background: linear-gradient(135deg, var(--rose), var(--rose-strong));
      clip-path: polygon(100% -3000%, 100% 50%, 50% 100%, 0% 50%);
    }

    .envelope-front::before,
    .envelope-front::after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-style: solid;
    }

    .envelope-front::before {
      top: 0;
      left: 0;
      border-width: 110px 160px 0 0;
      border-color: rgba(255,255,255,0.18) transparent transparent transparent;
    }

    .envelope-front::after {
      bottom: 0;
      right: 0;
      border-width: 0 0 110px 160px;
      border-color: transparent transparent rgba(255,255,255,0.16) transparent;
    }

    .postcard {
      position: absolute;
      width: 450px;
      height: 240px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      transform: translateY(120px) scale(0.82);
      opacity: 0;
      transition: all 0.9s ease;
      z-index: 2;
    }

    .postcard.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      width: 650px;
      height: 440px;
      z-index: 3;
    }

    .postcard-image {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .postcard img {
      width: 100%;
      object-fit: contain;
      display: block;
    }

    .postcard .text {
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #fffafc, #fceef2);
      font-size: 1.5rem;
      color: var(--text);
      line-height: 1.5;
    }

    .postcard .text strong {
      font-size: 2.5rem;
      color: var(--rose-strong);
    }

    .hint {
      position: absolute;
      bottom: 1.2rem;
      font-size: 0.95rem;
      color: var(--rose-strong);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    @media (max-width: 700px) {
      .postcard {
        width: 300px;
        height: 220px;
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .envelope {
        width: 280px;
        height: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="envelope" id="envelope">
      <div class="envelope-front">
        <div class="envelope-dobra"></div>
        Abra o cartão
      </div>
    </div>

    <div class="postcard" id="postcard">
      <div class="postcard-image">
        <img src="../public/19.avif" alt="Paisagem de Curitiba">
        <img src="../public/20.jpg" alt="Show da Xuxa">
      </div>
      <div class="text">
        <strong>OLÁ, MINHA BAIXINHA!</strong>
        <span>VAMOS NESSA AVENTURA COMIGO?</span>
        <span>BORA ENTRAR NA ÚLTIMA NAVE?</span>
      </div>
    </div>

    <div class="hint">Clique no envelope</div>
  </div>

  <script>
    const envelope = document.getElementById('envelope');
    const postcard = document.getElementById('postcard');

    envelope.addEventListener('click', () => {
      envelope.classList.add('open');
      envelope.querySelector('.envelope-front').innerText = '';
      postcard.classList.add('show');
    });
  </script>
</body>
</html>
